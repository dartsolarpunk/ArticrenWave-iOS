name: ArticrenWave
options:
  bundleIdPrefix: com.dartmeadow
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  xcodeVersion: "16.0"
  xcodeCompatibilityVersion: "Xcode 14.0"

targets:
  ArticrenWave:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ArticrenWave
    info:
      path: ArticrenWave/Info.plist
      properties:
        CFBundleDisplayName: Articren Wave
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Articren Wave uses the camera for AR score overlay."
        NSMicrophoneUsageDescription: "Articren Wave uses the microphone for live audio input."
        NSPhotoLibraryUsageDescription: "Articren Wave uses your photo library to set a profile avatar."
    entitlements:
      path: ArticrenWave/ArticrenWave.entitlements
    settings:
      base:
        PRODUCT_NAME: "Articren Wave"
        PRODUCT_BUNDLE_IDENTIFIER: ArticrenWave
        DEVELOPMENT_TEAM: L7AHWS9Q6V
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "iPhone Distribution"
        PROVISIONING_PROFILE: "b12f6031-5b23-4c52-8fbb-5185c60e83b9"
        PROVISIONING_PROFILE_SPECIFIER: "ArticrenWaveGitHubFlow"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: ArticrenWave/ArticrenWave.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"

schemes:
  ArticrenWave:
    build:
      targets:
        ArticrenWave: all
    archive:
      config: Release
