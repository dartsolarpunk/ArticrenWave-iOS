name: ArticrenWave — Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build ArticrenWave iOS to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.3.app
          xcodebuild -version

      - name: Patch build number into project.yml BEFORE xcodegen
        run: |
          BUILD=${{ github.run_number }}
          echo "Patching build number $BUILD into project.yml"
          # Replace CURRENT_PROJECT_VERSION in project.yml
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: \"$BUILD\"/" project.yml
          echo "project.yml CURRENT_PROJECT_VERSION now:"
          grep "CURRENT_PROJECT_VERSION" project.yml

      - name: Install xcodegen
        run: brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null || true

      - name: Generate Xcode project (with patched build number)
        run: |
          xcodegen generate --spec project.yml
          echo "Verifying CURRENT_PROJECT_VERSION in generated pbxproj:"
          grep "CURRENT_PROJECT_VERSION" ArticrenWave.xcodeproj/project.pbxproj | head -3

      - name: Install App Store Connect API key
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8

      - name: Setup keychain, certificate and provisioning profile
        env:
          CERTIFICATE_BASE64:          ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD:        ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD:           ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          P12_PATH="$RUNNER_TEMP/dist.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          PP_PATH="$RUNNER_TEMP/articrenwave.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i "$PP_PATH" 2>/dev/null | \
            plutil -extract UUID raw - 2>/dev/null || echo "b12f6031-5b23-4c52-8fbb-5185c60e83b9")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID.mobileprovision"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Archive
        run: |
          BUILD=${{ github.run_number }}
          xcodebuild archive \
            -project ArticrenWave.xcodeproj \
            -scheme ArticrenWave \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/ArticrenWave.xcarchive" \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db" \
            CURRENT_PROJECT_VERSION=$BUILD \
            MARKETING_VERSION=1.0
          
          APP=$(find "$RUNNER_TEMP/ArticrenWave.xcarchive/Products/Applications" -name "*.app" | head -1)
          BUILT_VER=$(plutil -extract CFBundleVersion raw "$APP/Info.plist")
          echo "✅ Archive CFBundleVersion = $BUILT_VER (expected $BUILD)"
          if [ "$BUILT_VER" != "$BUILD" ]; then
            echo "⚠️  Version mismatch — force-patching Info.plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$APP/Info.plist"
            echo "After patch: $(plutil -extract CFBundleVersion raw "$APP/Info.plist")"
            # Re-sign after plist change
            /usr/bin/codesign --force \
              --sign "iPhone Distribution: DART Meadow LLC (L7AHWS9Q6V)" \
              --entitlements "ArticrenWave/ArticrenWave.entitlements" \
              --keychain "$RUNNER_TEMP/signing.keychain-db" \
              "$APP"
          fi

      - name: Package IPA
        run: |
          APP=$(find "$RUNNER_TEMP/ArticrenWave.xcarchive/Products/Applications" -name "*.app" | head -1)
          echo "Final CFBundleVersion: $(plutil -extract CFBundleVersion raw "$APP/Info.plist")"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr "ArticrenWave.ipa" Payload/
          ls -lh "$RUNNER_TEMP/ArticrenWave.ipa"

      - name: Upload to TestFlight
        run: |
          echo "Uploading build ${{ github.run_number }}..."
          RESULT=$(xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ArticrenWave.ipa" \
            --apiKey "NQXQ595W59" \
            --apiIssuer "90056871-d791-45f6-a770-21399c45e491" \
            --apiKeyPath ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8 2>&1)
          echo "$RESULT"
          # Fail on any ERROR line
          if echo "$RESULT" | grep -iE "^.*ERROR:.*\(|UPLOAD FAILED|Failed to upload|duplicate"; then
            echo "❌ Upload rejected"; exit 1
          fi
          echo "✅ Build ${{ github.run_number }} delivered to TestFlight"

      - name: Clean keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
