name: ArticrenWave — Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build ArticrenWave iOS to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.3.app
          xcodebuild -version

      - name: Install App Store Connect API key
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8

      - name: Setup keychain, certificate and provisioning profile
        env:
          CERTIFICATE_BASE64:          ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD:        ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD:           ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          P12_PATH="$RUNNER_TEMP/dist.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          PP_PATH="$RUNNER_TEMP/articrenwave.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i "$PP_PATH" 2>/dev/null | \
            plutil -extract UUID raw - 2>/dev/null || echo "b12f6031-5b23-4c52-8fbb-5185c60e83b9")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID.mobileprovision"
          echo "PROFILE_UUID=$PP_UUID" >> $GITHUB_ENV

      - name: Archive
        run: |
          BUILD_NUM=${{ github.run_number }}
          PP_FINAL="${PROFILE_UUID:-b12f6031-5b23-4c52-8fbb-5185c60e83b9}"
          xcodebuild archive \
            -project ArticrenWave.xcodeproj \
            -scheme ArticrenWave \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/ArticrenWave.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PP_FINAL" \
            DEVELOPMENT_TEAM=L7AHWS9Q6V \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db" \
            PRODUCT_BUNDLE_IDENTIFIER=ArticrenWave \
            CURRENT_PROJECT_VERSION=$BUILD_NUM \
            MARKETING_VERSION=1.0
          APP=$(find "$RUNNER_TEMP/ArticrenWave.xcarchive/Products/Applications" -name "*.app" | head -1)
          echo "Build number in archive: $(plutil -extract CFBundleVersion raw "$APP/Info.plist")"

      - name: Export IPA via xcodebuild exportArchive
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ArticrenWave.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates || true
          ls -la "$RUNNER_TEMP/export/" 2>/dev/null || echo "Export dir empty"
          
          # Fallback: manual IPA if exportArchive fails
          if [ ! -f "$RUNNER_TEMP/export/ArticrenWave.ipa" ]; then
            echo "Falling back to manual IPA packaging..."
            ARCHIVE="$RUNNER_TEMP/ArticrenWave.xcarchive"
            APP=$(find "$ARCHIVE/Products/Applications" -name "*.app" | head -1)
            mkdir -p "$RUNNER_TEMP/Payload"
            cp -r "$APP" "$RUNNER_TEMP/Payload/"
            cd "$RUNNER_TEMP"
            zip -qr "export/ArticrenWave.ipa" Payload/
            mkdir -p export
            mv ArticrenWave.ipa export/ 2>/dev/null || true
          fi
          ls -lh "$RUNNER_TEMP/export/"

      - name: Upload to TestFlight
        run: |
          IPA=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          RESULT=$(xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "NQXQ595W59" \
            --apiIssuer "90056871-d791-45f6-a770-21399c45e491" \
            --apiKeyPath ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8 2>&1)
          echo "$RESULT"
          if echo "$RESULT" | grep -iE "UPLOAD FAILED|Failed to upload"; then
            echo "❌ Upload failed"; exit 1
          fi
          echo "✅ Build ${{ github.run_number }} uploaded to TestFlight"

      - name: Clean keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
