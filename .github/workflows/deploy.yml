name: ArticrenWave — Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build ArticrenWave iOS to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.3.app
          xcodebuild -version

      - name: Install App Store Connect API key
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8

      - name: Setup keychain, certificate and provisioning profile
        env:
          CERTIFICATE_BASE64:          ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD:        ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD:           ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          P12_PATH="$RUNNER_TEMP/dist.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          PP_PATH="$RUNNER_TEMP/articrenwave.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i "$PP_PATH" 2>/dev/null | \
            plutil -extract UUID raw - 2>/dev/null || echo "b12f6031-5b23-4c52-8fbb-5185c60e83b9")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID.mobileprovision"
          echo "PROFILE_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Archive
        run: |
          PP_FINAL="${PROFILE_UUID:-b12f6031-5b23-4c52-8fbb-5185c60e83b9}"
          xcodebuild archive \
            -project ArticrenWave.xcodeproj \
            -scheme ArticrenWave \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/ArticrenWave.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PP_FINAL" \
            DEVELOPMENT_TEAM=L7AHWS9Q6V \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db" \
            PRODUCT_BUNDLE_IDENTIFIER=ArticrenWave \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            MARKETING_VERSION=1.0

      - name: Export, patch build number, re-sign, upload
        run: |
          BUILD_NUM=${{ github.run_number }}

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ArticrenWave.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates || true

          IPA="$RUNNER_TEMP/export/ArticrenWave.ipa"
          if [ ! -f "$IPA" ]; then
            ARCHIVE="$RUNNER_TEMP/ArticrenWave.xcarchive"
            APP_SRC=$(find "$ARCHIVE/Products/Applications" -name "*.app" | head -1)
            mkdir -p "$RUNNER_TEMP/Payload"
            cp -r "$APP_SRC" "$RUNNER_TEMP/Payload/"
            mkdir -p "$RUNNER_TEMP/export"
            cd "$RUNNER_TEMP" && zip -qr "export/ArticrenWave.ipa" Payload/
          fi

          # Unzip IPA, patch build number, re-sign with project entitlements, rezip
          mkdir -p "$RUNNER_TEMP/ipa_work"
          cd "$RUNNER_TEMP/ipa_work"
          unzip -q "$IPA"
          APP=$(find . -name "*.app" | head -1)

          echo "CFBundleVersion before: $(plutil -extract CFBundleVersion raw "$APP/Info.plist")"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$APP/Info.plist"
          echo "CFBundleVersion after:  $(plutil -extract CFBundleVersion raw "$APP/Info.plist")"

          # Replace embedded.mobileprovision
          cp "$RUNNER_TEMP/articrenwave.mobileprovision" "$APP/embedded.mobileprovision"

          # Re-sign with ONLY Sign In with Apple entitlements (no iCloud dev keys)
          /usr/bin/codesign --force \
            --sign "iPhone Distribution: DART Meadow LLC (L7AHWS9Q6V)" \
            --entitlements "$GITHUB_WORKSPACE/ArticrenWave/ArticrenWave.entitlements" \
            --keychain "$KEYCHAIN_PATH" \
            "$APP"

          # Repackage
          rm -f "$IPA"
          zip -qr "$IPA" Payload/
          echo "Repacked IPA: $(ls -lh "$IPA" | awk '{print $5}')"

          # Upload
          echo "Uploading build $BUILD_NUM..."
          RESULT=$(xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "NQXQ595W59" \
            --apiIssuer "90056871-d791-45f6-a770-21399c45e491" \
            --apiKeyPath ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8 2>&1)
          echo "$RESULT"
          if echo "$RESULT" | grep -iE "UPLOAD FAILED|Failed to upload"; then
            echo "❌ Upload failed"; exit 1
          fi
          echo "✅ Build $BUILD_NUM uploaded to TestFlight"

      - name: Clean keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
